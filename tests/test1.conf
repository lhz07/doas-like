# /etc/doas.conf
#
# Parser stress test for OpenBSD doas.conf syntax.
# This file intentionally mixes broad rules, narrow overrides,
# quoted arguments, escaped spaces, line continuations, group identities,
# numeric identities, relative commands, and setenv forms.

# ----------------------------------------------------------------------
# Baseline rules
# ----------------------------------------------------------------------

# Broad allow for wheel, with environment manipulation.
permit setenv { -ENV PS1=$DOAS_PS1 SSH_AUTH_SOCK TERM LANG LC_ALL } :wheel

# Allow wheel to run any command as root, but keep the environment.
permit nopass keepenv :wheel as root

# Narrow deny to test override ordering.
deny :wheel as root cmd /bin/sh

# Deny a very specific command/argument combination.
deny :wheel as root cmd /usr/bin/vim args /etc/shadow

# Allow a different exact argument list for the same command.
permit :wheel as root cmd /usr/bin/vim args /etc/hosts

# Command with no arguments allowed explicitly.
permit nopass :wheel as root cmd /usr/bin/id args

# Same command, specific args.
permit nopass :wheel as root cmd /usr/bin/id args -u

# ----------------------------------------------------------------------
# Quoting, escaping, and line continuation
# ----------------------------------------------------------------------

# Double-quoted text containing a hash should not start a comment.
permit nopass :wheel as root cmd /usr/bin/printf args "%s" "literal # hash"

# Backslash-newline continuation outside comments.
permit nopass \
    :wheel \
    as root \
    cmd /usr/bin/printf \
    args "%s %s" "hello world" "quoted value"

# Escaped space outside quotes should stay part of the same argument.
permit nopass :wheel as root cmd /usr/bin/echo args foo\ bar baz

# Multiple quoted arguments, including spaces and hash symbols.
permit nopass :wheel cmd /usr/bin/printf args "a b" "c d" "e # f"

# ----------------------------------------------------------------------
# Relative path commands
# ----------------------------------------------------------------------

# Relative command path: should be searched using restricted PATH.
permit persist setenv { PKG_CACHE PKG_PATH } aja cmd pkg_add

# Relative command with no arguments.
permit nopass tedu cmd pkg_add

# Relative command with exact arguments.
permit nopass tedu cmd pkg_add args -u

# Deny a specific relative-command argument form.
deny tedu cmd pkg_add args -v

# ----------------------------------------------------------------------
# Numeric identities
# ----------------------------------------------------------------------

# Numeric identity should be accepted.
permit 1000 as root cmd /usr/bin/id args

# Numeric identity with a conflicting rule before a later override.
deny 1000 as root cmd /usr/bin/id args -u
permit 1000 as root cmd /usr/bin/id args -u

# ----------------------------------------------------------------------
# Root self-rules
# ----------------------------------------------------------------------

# Root can run itself while retaining PATH.
permit nopass keepenv setenv { PATH } root as root

# Conflicting rules to verify "last matching rule wins".
deny root as root cmd /usr/bin/true args
permit nopass root as root cmd /usr/bin/true args
deny root as root cmd /usr/bin/true args
permit root as root cmd /usr/bin/true args

# Conflicting rules on the same command/args pair.
permit nopass root as root cmd /usr/bin/id args -u
deny root as root cmd /usr/bin/id args -u
permit root as root cmd /usr/bin/id args -u

# Root can run a command with preserved environment variables only.
permit nopass keepenv setenv { PATH TERM } root as root cmd /usr/bin/printenv args PATH

# ----------------------------------------------------------------------
# Broad allow/deny patterns
# ----------------------------------------------------------------------

# This denies everything for wheel; later rules may override specific cases.
deny :wheel

deny :admin

# Broad allow for wheel again, but only after the deny above.
permit nopass :wheel as root

# Specific allow after the broad deny.
permit nopass :wheel as root cmd /usr/local/bin/tool args --flag "value with spaces"

# Specific environment assignment forms.
permit nopass setenv { VAR1=value1 VAR2=$HOME -OLDVAR } root as root cmd /usr/bin/printenv args VAR1 VAR2 OLDVAR

# A command with a quoted argument that contains spaces and punctuation.
permit nopass :wheel as root cmd /usr/bin/printf args "%s\\n" "backslash \\\\ test"

# ----------------------------------------------------------------------
# User-specific rules
# ----------------------------------------------------------------------

# Full command allow for a specific user.
permit nopass tedu as root cmd /usr/sbin/procmap

# Environment-retaining command with no arguments.
permit nopass tedu as root cmd /usr/bin/env args

# User-specific broad allow after narrower denies.
permit nopass tedu as root

# ----------------------------------------------------------------------
# Final override examples
# ----------------------------------------------------------------------

# These final lines intentionally override earlier matches for the same patterns.
deny :wheel as root cmd /usr/bin/vim args /etc/hosts
permit :wheel as root cmd /usr/bin/vim args /etc/hosts

deny :wheel as root cmd /usr/bin/printf args "%s" "literal # hash"
permit nopass :wheel as root cmd /usr/bin/printf args "%s" "literal # hash"
